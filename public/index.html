<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <title>FlixHQ API</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.2);
      margin-bottom: 20px;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .badge {
      display: inline-block;
      background: rgba(167,139,250,0.15);
      color: #a78bfa;
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 20px;
      padding: 3px 14px;
      font-size: 0.78rem;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
    }
    p {
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .dev {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
      margin-top: 24px;
    }
    .dev span { color: #a78bfa; }
  </style>
</head>
<body>
  <div class="card">
    <img class="avatar" src="https://media.tenor.com/TPg7tqBAHvoAAAAi/frieren-blow-kiss.gif" alt="avatar" />
    <h1>FlixHQ API</h1>
    <div class="badge">v1.0 · REST API</div>
    <p>A fast and reliable API for streaming movies and TV shows from FlixHQ.</p>
    <div class="dev">Developed by <span>Neo</span></div>
  </div>
</body>
</html>
